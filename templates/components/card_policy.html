{{ define "components/card_header" }}
<div
    class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border border-slate-100 dark:border-slate-800 shadow-sm relative overflow-hidden group">
    <div class="absolute top-0 right-0 p-6 opacity-5 transition-opacity pointer-events-none">
        <svg class="w-32 h-32 text-{{ .color }}-500 -mt-10 -mr-10" fill="none" stroke="currentColor"
            viewBox="0 0 24 24">
            {{ if eq .icon "user" }}
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            {{ else if eq .icon "lock" }}
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            {{ else if eq .icon "clock" }}
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            {{ else if eq .icon "shield"}}
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
            </path>
            {{ end }}
        </svg>
    </div>
    <h3 class="font-bold text-slate-800 dark:text-white mb-4 flex items-center justify-between relative z-10">
        <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-{{ .color }}-500"></span> {{ .title
            }}</span>
        <button onclick="toggleEdit('{{ .code }}', '{{ .color }}')" id="btn_edit_{{ .code }}"
            class="group/btn p-2 hover:bg-{{ .color }}-50 dark:hover:bg-{{ .color }}-900/10 rounded-xl transition flex items-center gap-2 text-slate-400">
            <span
                class="text-[9px] font-black uppercase tracking-widest hidden group-hover/btn:block text-{{ .color }}-600">Editar</span>
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
            </svg>
        </button>
    </h3>
    <fieldset id="fs_{{ .code }}" disabled
        class="flex flex-col gap-4 opacity-80 cursor-not-allowed transition-all duration-300">
        {{ end }}

        {{ define "components/card_footer" }}
    </fieldset>
</div>
{{ end }}
