{{ define "partials/nav_admin" }}
<nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-6">
                <a href="/admin" class="group flex items-center gap-2">
                    <div class="bg-indigo-600 text-white p-1.5 rounded-lg group-hover:bg-indigo-700 transition">
                        {{ template "icon-lightning" }}
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-800">Peak Auth</span>
                </a>
                <div class="hidden md:flex items-center gap-2 text-slate-400">
                    {{ range .Breadcrumbs }}
                    <span class="text-indigo-300">/</span>
                    {{ if .URL }}
                    <a href="{{ .URL }}" class="text-xs hover:text-indigo-200 transition font-medium">{{ .Label
                        }}</a>
                    {{ else }}
                    <span class="text-sm font-medium text-slate-600">{{ .Label }}</span>
                    {{ end }}
                    {{ end }}
                </div>
            </div>
            <div class="flex items-center gap-4">
                <!-- Dark Mode Toggle -->
                <button onclick="toggleDarkMode()"
                    class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-colors"
                    title="Alternar Modo Oscuro">
                    {{ template "icon-moon" }}
                    {{ template "icon-sun" }}
                </button>

                {{ if .UserEmail }}
                <div class="hidden sm:flex flex-col items-end mr-2">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Administrador</span>
                    <span class="text-sm font-medium text-slate-700">{{ .UserEmail }}</span>
                </div>
                {{ end }}
                <form action="/admin/logout" method="POST" class="inline">
                    <button type="submit"
                        class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-colors"
                        title="Cerrar Sesión">
                        {{ template "logout" }}
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
{{ end }}
