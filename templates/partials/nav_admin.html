{{ define "partials/nav_admin" }}
<nav
    class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200 dark:border-slate-800">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-6">
                <a href="/admin" class="group flex items-center gap-2">
                    <div class="p-1 rounded-lg transition-transform duration-200 group-hover:scale-105">
                        <img src="{{ asset " /static/img/logo.svg" }}" alt="Peak Auth" class="w-8 h-8">
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-800 dark:text-white">
                        Peak Auth
                    </span>
                </a>
                <div class="hidden md:flex items-center gap-2 text-slate-400 dark:text-slate-500">
                    {{ range .Breadcrumbs }}
                    <span class="text-brand-300 dark:text-brand-600">/</span>
                    {{ if .URL }}
                    <a href="{{ .URL }}" class="text-xs hover:text-brand-400 transition font-medium">{{ .Label
                        }}</a>
                    {{ else }}
                    <span class="text-sm font-medium text-slate-600 dark:text-slate-300">{{ .Label }}</span>
                    {{ end }}
                    {{ end }}
                </div>
            </div>
            <div class="flex items-center gap-4">
                <!-- Dark Mode Toggle -->
                <button onclick="toggleDarkMode()"
                    class="p-2 text-slate-400 dark:text-slate-500 hover:text-brand-600 dark:hover:text-brand-300 hover:bg-brand-50 dark:hover:bg-slate-800 rounded-xl transition-colors"
                    title="Alternar Modo Oscuro">
                    {{ template "icon-moon" }}
                    {{ template "icon-sun" }}
                </button>

                {{ if .UserEmail }}
                <div class="hidden sm:flex flex-col items-end mr-2">
                    <span
                        class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Administrador</span>
                    <span class="text-sm font-medium text-slate-700 dark:text-slate-200">{{ .UserEmail }}</span>
                </div>
                {{ end }}
                <form action="/admin/logout" method="POST" class="inline">
                    <button type="submit"
                        class="p-2 text-slate-400 dark:text-slate-500 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-colors"
                        title="Cerrar Sesión">
                        {{ template "logout" }}
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
{{ end }}
