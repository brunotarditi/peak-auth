<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peak Auth - Setup Inicial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/admin/js/config.js?v={{ now.Unix }}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/admin/css/admin.css?v=1.1">
</head>

<body class="bg-pattern flex items-center justify-center min-h-screen p-4 text-slate-900">
    <div class="max-w-md w-full animate-slide-in-right">
        <div class="text-center mb-10">
            <div
                class="bg-indigo-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-indigo-200 dark:shadow-none">
                {{template "icon-lightning"}}
            </div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Setup <span
                    class="text-indigo-600">Peak Auth</span></h1>
            <p class="text-slate-400 mt-2 font-medium uppercase tracking-[0.2em] text-[10px]">Paso Final de Instalación
            </p>
        </div>

        <div
            class="bg-white dark:bg-slate-900 p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800">
            <div class="mb-8">
                <h2 class="text-xl font-bold text-slate-800 dark:text-white mb-2">Usuario Maestro</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed font-medium">Crea la cuenta de
                    administrador con control total sobre todos los recursos.</p>
            </div>

            <form action="/setup" method="POST" class="space-y-6">
                <input type="hidden" name="token" value="{{.SetupToken}}">

                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Email del
                        Root</label>
                    <input type="email" name="email" required placeholder="admin@proyectopeak.com"
                        class="w-full px-5 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition text-slate-900 dark:text-white font-medium">
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Contraseña
                        Maestra</label>
                    <input type="password" name="password" required placeholder="••••••••"
                        class="w-full px-5 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition text-slate-900 dark:text-white font-medium">
                    <div
                        class="mt-4 p-4 bg-amber-50 dark:bg-amber-900/10 border border-amber-100 dark:border-amber-900/30 rounded-xl flex items-start gap-3">
                        {{template "icon-warning"}}
                        <p class="text-[10px] text-amber-700 dark:text-amber-500 font-bold leading-tight">
                            Guarda esta contraseña en un lugar seguro. Es la llave maestra de tu infraestructura.
                        </p>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition shadow-xl shadow-indigo-100 dark:shadow-none flex items-center justify-center gap-3 group">
                        <span>Finalizar Instalación</span>
                        {{template "icon-check"}}
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-10 flex items-center justify-center gap-6">
            <div class="h-px bg-slate-200 dark:bg-slate-800 w-12"></div>
            <p class="text-[10px] text-slate-400 dark:text-slate-600 font-black uppercase tracking-widest">Paso 1 de 1
            </p>
            <div class="h-px bg-slate-200 dark:bg-slate-800 w-12"></div>
        </div>
    </div>
</body>

</html>
