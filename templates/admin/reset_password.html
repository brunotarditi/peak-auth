<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peak Auth - Establecer Contraseña</title>
    <script src="{{ asset "/static/js/dist/config.min.js" }}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ asset "/static/css/output.css" }}">
    <link rel="stylesheet" href="{{ asset "/static/css/admin.css" }}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ asset "/static/js/dist/common.min.js" }}"></script>
</head>

<body class="bg-pattern flex items-center justify-center min-h-screen p-4 text-slate-900 bg-slate-50 dark:bg-slate-950">
    <div class="max-w-md w-full animate-slide-in-bottom">
        <div class="text-center mb-8">
            <div
                class="bg-indigo-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-indigo-200 dark:shadow-none">
                {{template "icon-lock"}}
            </div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Activa tu <span
                    class="text-indigo-600">Cuenta</span></h1>
            <p class="text-slate-400 mt-2 font-medium">Establece tu contraseña para comenzar</p>
        </div>

        <div
            class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800">
            <form id="resetForm" onsubmit="handleReset(event)" class="space-y-6">
                <input type="hidden" name="token" id="reset_token" value="{{ .token }}">

                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Nueva
                        Contraseña</label>
                    <div class="relative group">
                        <input type="password" name="password" id="password_field" required minlength="4"
                            placeholder="••••••••"
                            class="w-full px-5 py-4 pr-12 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition text-slate-900 dark:text-white font-medium">
                        <button type="button" onclick="toggleLoginPassword('password_field')"
                            class="absolute inset-y-0 right-0 px-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
                            {{template "icon-eye"}}
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Confirmar
                        Contraseña</label>
                    <div class="relative group">
                        <input type="password" name="confirm_password" id="confirm_password_field" required
                            minlength="4" placeholder="••••••••"
                            class="w-full px-5 py-4 pr-12 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition text-slate-900 dark:text-white font-medium">
                        <button type="button" onclick="toggleLoginPassword('confirm_password_field')"
                            class="absolute inset-y-0 right-0 px-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
                            {{template "icon-eye"}}
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition shadow-xl shadow-indigo-100 dark:shadow-none flex items-center justify-center gap-3 group">
                    <span>Activar Cuenta</span>
                    {{template "icon-check-circle"}}
                </button>
            </form>
        </div>

        <p class="text-center text-slate-400 dark:text-slate-600 text-[10px] mt-8 font-black uppercase tracking-widest">
            Peak Auth Secure Activation System
        </p>
    </div>

    <script src="{{ asset "/static/js/dist/reset-password.min.js" }}"></script>
</body>

</html>
