{{ template "admin/header" . }}
<div class="flex justify-center max-w-2xl mx-auto">
    <div class="bg-white p-10 rounded-3xl shadow-sm border border-slate-100 w-full">
        <div class="flex items-center gap-4 mb-8">
            <a href="/admin" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </a>
            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">{{ if .App }}Editar Aplicación{{ else }}Nueva
                Aplicación{{ end }}</h2>
        </div>

        <form action="{{ if .App }}/admin/apps/{{ .App.AppID }}{{ else }}/admin/apps{{ end }}" method="POST"
            class="space-y-8">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 tracking-tight">Nombre de la
                    aplicación</label>
                <input type="text" name="name" value="{{ if .App }}{{ .App.Name }}{{ end }}"
                    placeholder="Ej: Mi App de Recetas" required
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition bg-slate-50/50 focus:bg-white text-lg">
                <p
                    class="text-[10px] text-slate-400 mt-2 font-medium flex items-center gap-1 uppercase tracking-widest">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    {{ if .App }}App ID: {{ .App.AppID }}{{ else }}El AppID se generará automáticamente{{ end }}
                </p>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 tracking-tight">Descripción</label>
                <textarea name="description" rows="4"
                    placeholder="Describe brevemente el propósito de esta aplicación para el equipo..."
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition bg-slate-50/50 focus:bg-white">{{ if .App }}{{ .App.Description }}{{ end }}</textarea>
            </div>

            <div class="p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100 flex items-center justify-between">
                <div class="flex items-center">
                    <input type="checkbox" name="is_active" {{ if or (not .App) .App.IsActive }}checked{{ end }}
                        id="is_active"
                        class="h-5 w-5 text-indigo-600 border-slate-300 rounded-md focus:ring-indigo-500 transition cursor-pointer">
                    <label for="is_active" class="ml-3 text-sm text-indigo-900 font-bold cursor-pointer">
                        {{ if .App }}Estado de la Aplicación (Activa){{ else }}Activar inmediatamente{{ end }}
                    </label>
                </div>
                <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 pt-4">
                <a href="/admin"
                    class="flex-1 text-center py-4 px-6 border border-slate-200 rounded-xl text-slate-600 font-bold hover:bg-slate-50 transition">
                    Cancelar
                </a>
                <button type="submit"
                    class="flex-1 bg-indigo-600 text-white font-bold py-4 px-6 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition flex items-center justify-center gap-2 group">
                    <span>{{ if .App }}Guardar Cambios{{ else }}Crear Aplicación{{ end }}</span>
                    <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </button>
            </div>
        </form>
    </div>
</div>
{{ template "admin/footer" . }}
