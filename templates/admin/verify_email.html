<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peak Auth - Email Verificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/admin/js/config.js?v={{ now.Unix }}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/admin/css/admin.css?v=1.1">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-pattern flex items-center justify-center min-h-screen p-4 text-slate-900 bg-slate-50 dark:bg-dark-bg">
    <div class="max-w-md w-full animate-slide-in-bottom">
        <div
            class="bg-white dark:bg-slate-900 p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800 text-center">
            <div
                class="bg-emerald-500 text-white w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl shadow-emerald-100 dark:shadow-none">
                {{template "icon-check"}}
            </div>

            <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight mb-4">¡Email <span
                    class="text-emerald-500">Verificado!</span></h1>
            <p class="text-slate-400 font-medium leading-relaxed mb-10">Tu dirección de correo electrónico ha sido
                confirmada con éxito. Ya puedes acceder a todas las funciones de tu aplicación.</p>

            <button onclick="window.close()"
                class="w-full bg-slate-900 dark:bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 dark:hover:bg-indigo-700 transition shadow-xl shadow-slate-100 dark:shadow-none flex items-center justify-center gap-3 group">
                <span>Cerrar Ventana</span>
                {{template "icon-close"}}
            </button>
        </div>

        <p
            class="text-center text-slate-400 dark:text-slate-600 text-[10px] mt-10 font-black uppercase tracking-widest">
            Peak Auth Security Protocol Verified
        </p>
    </div>
</body>

</html>
